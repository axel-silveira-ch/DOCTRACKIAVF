<!-- templates/components/diag.html -->
<div id="diag-tab" class="tab-pane">
    <div id="diag-content" class="diag-container">
        <!-- El contenido se cargará dinámicamente por JavaScript -->
        <div class="loading-diag">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500 mx-auto mb-4"></div>
            <p class="text-gray-400">Cargando sistema de predicción de diagnósticos...</p>
        </div>
    </div>
</div>

<style>
.custom-scrollbar::-webkit-scrollbar {
    width: 6px;
}

.custom-scrollbar::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 3px;
}

.custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
}

.custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
}

.patient-item {
    transition: all 0.2s ease;
}

.patient-item:hover {
    transform: translateX(5px);
    border-color: #a855f7;
}
</style>
